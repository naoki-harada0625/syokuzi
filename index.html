<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おかず提案アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #fff8ef;
      --bg-mid: #f6fbff;
      --bg-bottom: #fff3e6;
      --surface: rgba(255, 255, 255, 0.76);
      --surface-strong: rgba(255, 255, 255, 0.9);
      --text-main: #2e2a26;
      --text-sub: #6e665f;
      --shadow-soft: 0 18px 44px rgba(95, 79, 63, 0.14);
      --shadow-card: 0 14px 28px rgba(71, 53, 38, 0.12);
      --border-soft: rgba(255, 255, 255, 0.7);
      --washoku: #67a85d;
      --yoshoku: #f09a4a;
      --chuka: #dd5a56;
      --korean: #e1bf38;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans JP", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(255, 228, 196, 0.6), transparent 35%),
        radial-gradient(circle at right 15% top 20%, rgba(255, 216, 177, 0.55), transparent 28%),
        linear-gradient(145deg, var(--bg-top), var(--bg-mid) 48%, var(--bg-bottom));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(18px);
      opacity: 0.5;
    }

    body::before {
      width: 260px;
      height: 260px;
      top: 6%;
      left: -80px;
      background: rgba(255, 202, 161, 0.35);
    }

    body::after {
      width: 320px;
      height: 320px;
      right: -90px;
      bottom: 10%;
      background: rgba(200, 231, 206, 0.28);
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 34px;
      border: 1px solid var(--border-soft);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(255, 249, 240, 0.72));
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -35px;
      top: -35px;
      border-radius: 36px;
      background: linear-gradient(135deg, rgba(255, 196, 146, 0.35), rgba(255, 255, 255, 0));
      transform: rotate(18deg);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 244, 229, 0.92);
      color: #8c5c26;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.8rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .hero p {
      max-width: 640px;
      margin: 16px 0 0;
      color: var(--text-sub);
      font-size: 1rem;
      line-height: 1.8;
    }

    .panel {
      margin-top: 28px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .section-copy {
      margin: 0;
      color: var(--text-sub);
      line-height: 1.7;
    }

    .genre-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
    }

    .genre-button,
    .shuffle-button,
    .back-button,
    .card-button {
      border: 0;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease, background 0.2s ease;
      font-family: inherit;
    }

    .genre-button {
      position: relative;
      padding: 16px 18px;
      border-radius: 18px;
      color: #ffffff;
      text-align: left;
      box-shadow: 0 10px 24px rgba(56, 43, 33, 0.14);
    }

    .genre-button span {
      display: block;
      font-size: 0.84rem;
      font-weight: 500;
      opacity: 0.86;
    }

    .genre-button strong {
      display: block;
      margin-top: 4px;
      font-size: 1.15rem;
      font-weight: 800;
    }

    .genre-button[data-genre="和食"] {
      background: linear-gradient(135deg, #79bb6f, #4d8750);
    }

    .genre-button[data-genre="洋食"] {
      background: linear-gradient(135deg, #ffb366, #de7d2e);
    }

    .genre-button[data-genre="中華"] {
      background: linear-gradient(135deg, #f17368, #ca433f);
    }

    .genre-button[data-genre="韓国料理"] {
      color: #5f4800;
      background: linear-gradient(135deg, #f3d14e, #d5ad21);
    }

    .genre-button:hover,
    .shuffle-button:hover,
    .back-button:hover,
    .card-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .genre-button.active {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 16px 28px rgba(65, 49, 35, 0.2);
    }

    .genre-button.active::after {
      content: "選択中";
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      font-size: 0.74rem;
      font-weight: 700;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 30px;
      margin-bottom: 20px;
    }

    .result-title {
      margin: 0;
      font-size: clamp(1.4rem, 2.2vw, 2rem);
      line-height: 1.3;
    }

    .result-subtitle {
      margin: 8px 0 0;
      color: var(--text-sub);
    }

    .shuffle-button {
      padding: 14px 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, #403126, #6b4b36);
      color: #fff8f1;
      font-size: 0.98rem;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(69, 46, 30, 0.2);
    }

    .shuffle-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
      box-shadow: none;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      overflow: hidden;
      min-height: 232px;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      background: var(--surface-strong);
      box-shadow: var(--shadow-card);
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.65s ease forwards;
    }

    .card-button {
      width: 100%;
      color: inherit;
      text-align: left;
      background: transparent;
      padding: 0;
    }

    .card-button .card {
      min-height: 100%;
    }

    .card-hint {
      margin-top: 18px;
      color: #9a6a3f;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .detail-shell {
      animation: fadeUp 0.65s ease forwards;
    }

    .detail-card {
      position: relative;
      overflow: hidden;
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      background: var(--surface-strong);
      box-shadow: var(--shadow-card);
    }

    .detail-card::before {
      content: "";
      position: absolute;
      inset: auto -48px -52px auto;
      width: 180px;
      height: 180px;
      border-radius: 36px;
      background: linear-gradient(135deg, rgba(255, 205, 160, 0.42), rgba(255, 255, 255, 0));
      transform: rotate(12deg);
      pointer-events: none;
    }

    .detail-top {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 28px;
    }

    .back-button {
      align-self: flex-start;
      padding: 12px 18px;
      border-radius: 14px;
      background: rgba(252, 244, 235, 0.98);
      color: #684833;
      font-size: 0.94rem;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(96, 70, 53, 0.12);
    }

    .detail-title {
      margin: 0;
      font-size: clamp(1.9rem, 4vw, 3rem);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .detail-description {
      margin: 0;
      max-width: 760px;
      color: var(--text-sub);
      line-height: 1.8;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
      gap: 22px;
    }

    .detail-section {
      position: relative;
      padding: 20px;
      border-radius: 22px;
      background: rgba(255, 251, 246, 0.95);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    .detail-section h3 {
      margin: 0 0 16px;
      font-size: 1.12rem;
    }

    .ingredients-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .ingredient-item {
      display: grid;
      gap: 6px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
    }

    .ingredient-name {
      font-weight: 700;
    }

    .ingredient-amount {
      color: var(--text-sub);
      font-size: 0.92rem;
    }

    .timeline {
      position: relative;
      display: grid;
      gap: 16px;
      padding-left: 12px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 6px;
      bottom: 6px;
      width: 2px;
      background: linear-gradient(180deg, #ebc79f, #dfb07f);
    }

    .timeline-step {
      position: relative;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 14px;
      align-items: start;
    }

    .timeline-number {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f2ba7f, #d98b46);
      color: #fffaf4;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(179, 118, 61, 0.24);
    }

    .timeline-body {
      padding-top: 5px;
      color: var(--text-sub);
      line-height: 1.75;
    }

    .detail-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .advice {
      margin: 0;
      color: var(--text-sub);
      line-height: 1.8;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: auto -24px -24px auto;
      width: 100px;
      height: 100px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 199, 147, 0.4), rgba(255, 255, 255, 0));
      transform: rotate(15deg);
    }

    .card:nth-child(2) {
      animation-delay: 0.08s;
    }

    .card:nth-child(3) {
      animation-delay: 0.16s;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 244, 230, 0.95);
      color: #996334;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .card h3 {
      margin: 18px 0 10px;
      font-size: 1.35rem;
      line-height: 1.4;
    }

    .description {
      margin: 0 0 20px;
      color: var(--text-sub);
      line-height: 1.7;
    }

    .meta {
      display: grid;
      gap: 10px;
      margin-top: auto;
    }

    .meta-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(251, 246, 240, 0.92);
      font-size: 0.95rem;
    }

    .meta-label {
      color: #7b6b5b;
      font-weight: 500;
    }

    .meta-value {
      font-weight: 700;
    }

    .empty-state {
      padding: 38px 24px;
      border: 1px dashed rgba(148, 124, 102, 0.24);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.64);
      text-align: center;
      color: var(--text-sub);
    }

    .empty-state strong {
      display: block;
      margin-bottom: 10px;
      color: var(--text-main);
      font-size: 1.15rem;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .genre-buttons,
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .result-header {
        flex-direction: column;
        align-items: stretch;
      }

      .shuffle-button {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1120px);
        padding-top: 20px;
        padding-bottom: 32px;
      }

      .hero,
      .panel {
        padding: 20px;
        border-radius: 22px;
      }

      .genre-buttons,
      .cards {
        grid-template-columns: 1fr;
      }

      .ingredients-grid,
      .detail-meta {
        grid-template-columns: 1fr;
      }

      .genre-button {
        padding: 15px 16px;
      }

      .card {
        min-height: auto;
      }

      .detail-card {
        padding: 20px;
      }

      .timeline {
        padding-left: 0;
      }

      .timeline-step {
        grid-template-columns: 34px 1fr;
        gap: 12px;
      }

      .timeline-number {
        width: 34px;
        height: 34px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">今日の献立を軽やかに決める</div>
      <h1>気分に合わせて、おかずを3品まとめて提案</h1>
      <p>和食・洋食・中華・韓国料理からジャンルを選ぶだけで、すぐに今日のおかず候補を表示します。迷ったときは再抽選して、ちょうどいい組み合わせを見つけてください。</p>
    </section>

    <section class="panel" aria-labelledby="genre-heading">
      <h2 id="genre-heading" class="section-title">ジャンルを選択</h2>
      <p class="section-copy">気分に近いジャンルを選ぶと、そのカテゴリからランダムで3品を提案します。</p>
      <div class="genre-buttons" id="genreButtons" role="group" aria-label="ジャンル選択ボタン"></div>

      <div class="result-header">
        <div>
          <h2 class="result-title" id="resultTitle">まずはジャンルを選んでください</h2>
          <p class="result-subtitle" id="resultSubtitle">ボタンを押すと、おすすめのおかず3品を表示します。</p>
        </div>
        <button class="shuffle-button" id="shuffleButton" type="button" disabled>もう一回提案</button>
      </div>

      <section id="cardsArea" aria-live="polite">
        <div class="empty-state" id="emptyState">
          <strong>まだ提案は表示されていません</strong>
          ジャンルを選んで、今日の献立候補をチェックしてください。
        </div>
      </section>
    </section>
  </main>

  <script>
    const okazuData = {
      "和食": [
        {
          name: "肉じゃが",

          time: "約30分",
          difficulty: "★★☆",
          ingredients: [
            { name: "牛こま切れ肉", amount: "180g" },
            { name: "じゃがいも", amount: "2個" },
            { name: "玉ねぎ", amount: "1個" },
            { name: "にんじん", amount: "1/2本" },
            { name: "しらたき", amount: "100g" },
            { name: "しょうゆ", amount: "大さじ2" },
            { name: "みりん", amount: "大さじ2" }
          ],
          steps: [
            "じゃがいも、玉ねぎ、にんじんを食べやすく切り、しらたきは下ゆでしておきます。",

            "だし200ml、しょうゆ、みりん、砂糖大さじ1を加えて落としぶたをし、やわらかくなるまで煮ます。",
            "汁気が少し残るくらいまで煮詰めて味をなじませます。"
          ],
          advice: "じゃがいもは煮崩れしにくい大きさに切ると仕上がりがきれいです。少し冷ましてから温め直すと味がより染みます。"
        },
        {
          name: "ぶりの照り焼き",
          description: "香ばしい照りが食欲をそそる魚おかずです。",
          time: "約20分",
          difficulty: "★★☆",
          ingredients: [
            { name: "ぶり切り身", amount: "2切れ" },
            { name: "塩", amount: "少々" },
            { name: "小麦粉", amount: "大さじ1" },
            { name: "しょうゆ", amount: "大さじ1と1/2" },
            { name: "みりん", amount: "大さじ1と1/2" },
            { name: "酒", amount: "大さじ1" },
            { name: "砂糖", amount: "小さじ2" }
          ],
          steps: [
            "ぶりに塩を振って10分ほど置き、水気を拭いて小麦粉を薄くまぶします。",
            "フライパンでぶりの両面をこんがり焼きます。",
            "余分な油を拭き、しょうゆ、みりん、酒、砂糖を合わせたたれを加えます。",
            "たれを煮絡めながら照りが出るまで仕上げます。"
          ],
          advice: "最初に塩を振って臭みを抜くと仕上がりがすっきりします。たれを入れたあとは焦げやすいので手早く絡めてください。"

        {
          name: "ほうれん草の胡麻和え",
          description: "あと一品にちょうどいい、やさしい副菜です。",
          time: "約10分",
          difficulty: "★☆☆",
          ingredients: [
            { name: "ほうれん草", amount: "1束" },
            { name: "白すりごま", amount: "大さじ2" },
            { name: "しょうゆ", amount: "小さじ2" },
            { name: "砂糖", amount: "小さじ1" },
            { name: "だし", amount: "小さじ1" }
          ],
          steps: [
            "ほうれん草をさっとゆでて冷水に取り、水気をしっかり絞って3cm幅に切ります。",

          ],
          advice: "水気をよく絞ると味がぼやけません。食べる直前に和えると香りがきれいに残ります。"

          ingredients: [

            "火が通ったらみりん、しょうゆ大さじ1、砂糖を加えて煮絡めます。",

          advice: "肉だねは練りすぎず、さっくりまとめるとやわらかく仕上がります。少し厚みをそろえると焼きむらが出にくいです。"

        {
          name: "さばの味噌煮",
          description: "味噌のコクが染みた、ごはん向きの一皿です。",

          difficulty: "★★★",
          ingredients: [
            { name: "さば切り身", amount: "2切れ" },
            { name: "しょうが", amount: "1かけ" },
            { name: "味噌", amount: "大さじ2" },
            { name: "しょうゆ", amount: "小さじ1" },
            { name: "みりん", amount: "大さじ2" },
            { name: "酒", amount: "100ml" },
            { name: "砂糖", amount: "大さじ1" }
          ],

    function shuffleArray(list) {
      const copy = [...list];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
      }
      return copy;
    }

              </div>
            </div>
            <div class="card-hint">クリックで詳細を見る</div>
          </article>
        </button>
      `).join("");

      cardsArea.innerHTML = `<div class="cards">${cardsMarkup}</div>`;

      cardsArea.querySelectorAll(".card-button").forEach((button) => {
        button.addEventListener("click", () => {
          const item = currentSuggestions[Number(button.dataset.index)];
          if (!item) {
            return;
          }
          showDetail(item);
        });
      });
    }

    function renderDetail(item) {
      const ingredientsMarkup = item.ingredients.map((ingredient) => `
        <div class="ingredient-item">
          <span class="ingredient-name">${ingredient.name}</span>
          <span class="ingredient-amount">${ingredient.amount}</span>
        </div>
      `).join("");

      const stepsMarkup = item.steps.map((step, index) => `
        <div class="timeline-step">
          <span class="timeline-number">${index + 1}</span>
          <div class="timeline-body">${step}</div>
        </div>
      `).join("");

      cardsArea.innerHTML = `
        <section class="detail-shell">
          <article class="detail-card">
            <div class="detail-top">
              <button class="back-button" id="backButton" type="button">戻る</button>
              <div>
                <span class="badge">${currentGenre}</span>
                <h3 class="detail-title">${item.name}</h3>
                <p class="detail-description">${item.description}</p>
              </div>
            </div>
            <div class="detail-grid">
              <section class="detail-section">
                <h3>材料（2人分）</h3>
                <div class="ingredients-grid">${ingredientsMarkup}</div>
              </section>
              <section class="detail-section">
                <h3>作り方</h3>
                <div class="timeline">${stepsMarkup}</div>
              </section>
              <section class="detail-section">
                <h3>ワンポイントアドバイス</h3>
                <p class="advice">${item.advice}</p>
              </section>
              <section class="detail-section">
                <h3>基本情報</h3>
                <div class="detail-meta">
                  <div class="meta-item">
                    <span class="meta-label">調理時間</span>
                    <span class="meta-value">${item.time}</span>
                  </div>
                  <div class="meta-item">
                    <span class="meta-label">難易度</span>
                    <span class="meta-value">${item.difficulty}</span>
                  </div>
                </div>
              </section>
            </div>
          </article>
        </section>
      `;

      document.getElementById("backButton").addEventListener("click", () => {
        selectedItem = null;
        updateHeaderForList();
        renderCards(currentSuggestions);
      });
    }

    function updateHeaderForList() {
      resultTitle.textContent = `${currentGenre}のおすすめおかず`;
      resultSubtitle.textContent = "気分に合う3品を表示しています。気に入らなければ「もう一回提案」で再抽選できます。";
      shuffleButton.disabled = false;
    }

    function showDetail(item) {
      selectedItem = item;
      resultTitle.textContent = `${item.name}の詳細`;
      resultSubtitle.textContent = "材料と手順を確認して、一覧へ戻る場合は左上のボタンを使ってください。";
      shuffleButton.disabled = true;
      renderDetail(item);
    }

    function proposeOkazu(genreName) {
      currentGenre = genreName;
      selectedItem = null;
      currentSuggestions = getRandomOkazu(genreName);
      updateActiveButton();
      updateHeaderForList();
      renderCards(currentSuggestions);
    }

    function createGenreButtons() {
      genreButtons.innerHTML = genres.map((genre) => `
        <button class="genre-button" type="button" data-genre="${genre.name}" aria-pressed="false">
          <span>${genre.accent}</span>
          <strong>${genre.name}</strong>
        </button>
      `).join("");

      genreButtons.querySelectorAll(".genre-button").forEach((button) => {
        button.addEventListener("click", () => {
          proposeOkazu(button.dataset.genre);
        });
      });
    }

    shuffleButton.addEventListener("click", () => {
      if (!currentGenre) {
        return;
      }
      proposeOkazu(currentGenre);
    });

    createGenreButtons();
  </script>
</body>
</html>
