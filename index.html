<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おかず提案アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #fff8ef;
      --bg-mid: #f6fbff;
      --bg-bottom: #fff3e6;
      --surface: rgba(255, 255, 255, 0.76);
      --surface-strong: rgba(255, 255, 255, 0.9);
      --text-main: #2e2a26;
      --text-sub: #6e665f;
      --shadow-soft: 0 18px 44px rgba(95, 79, 63, 0.14);
      --shadow-card: 0 14px 28px rgba(71, 53, 38, 0.12);
      --border-soft: rgba(255, 255, 255, 0.7);
      --washoku: #67a85d;
      --yoshoku: #f09a4a;
      --chuka: #dd5a56;
      --korean: #e1bf38;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans JP", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(255, 228, 196, 0.6), transparent 35%),
        radial-gradient(circle at right 15% top 20%, rgba(255, 216, 177, 0.55), transparent 28%),
        linear-gradient(145deg, var(--bg-top), var(--bg-mid) 48%, var(--bg-bottom));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(18px);
      opacity: 0.5;
    }

    body::before {
      width: 260px;
      height: 260px;
      top: 6%;
      left: -80px;
      background: rgba(255, 202, 161, 0.35);
    }

    body::after {
      width: 320px;
      height: 320px;
      right: -90px;
      bottom: 10%;
      background: rgba(200, 231, 206, 0.28);
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 34px;
      border: 1px solid var(--border-soft);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(255, 249, 240, 0.72));
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -35px;
      top: -35px;
      border-radius: 36px;
      background: linear-gradient(135deg, rgba(255, 196, 146, 0.35), rgba(255, 255, 255, 0));
      transform: rotate(18deg);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 244, 229, 0.92);
      color: #8c5c26;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.8rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .hero p {
      max-width: 640px;
      margin: 16px 0 0;
      color: var(--text-sub);
      font-size: 1rem;
      line-height: 1.8;
    }

    .panel {
      margin-top: 28px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .section-copy {
      margin: 0;
      color: var(--text-sub);
      line-height: 1.7;
    }

    .genre-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
    }

    .genre-button,
    .shuffle-button {
      border: 0;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease, background 0.2s ease;
      font-family: inherit;
    }

    .genre-button {
      position: relative;
      padding: 16px 18px;
      border-radius: 18px;
      color: #ffffff;
      text-align: left;
      box-shadow: 0 10px 24px rgba(56, 43, 33, 0.14);
    }

    .genre-button span {
      display: block;
      font-size: 0.84rem;
      font-weight: 500;
      opacity: 0.86;
    }

    .genre-button strong {
      display: block;
      margin-top: 4px;
      font-size: 1.15rem;
      font-weight: 800;
    }

    .genre-button[data-genre="和食"] {
      background: linear-gradient(135deg, #79bb6f, #4d8750);
    }

    .genre-button[data-genre="洋食"] {
      background: linear-gradient(135deg, #ffb366, #de7d2e);
    }

    .genre-button[data-genre="中華"] {
      background: linear-gradient(135deg, #f17368, #ca433f);
    }

    .genre-button[data-genre="韓国料理"] {
      color: #5f4800;
      background: linear-gradient(135deg, #f3d14e, #d5ad21);
    }

    .genre-button:hover,
    .shuffle-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .genre-button.active {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 16px 28px rgba(65, 49, 35, 0.2);
    }

    .genre-button.active::after {
      content: "選択中";
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      font-size: 0.74rem;
      font-weight: 700;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 30px;
      margin-bottom: 20px;
    }

    .result-title {
      margin: 0;
      font-size: clamp(1.4rem, 2.2vw, 2rem);
      line-height: 1.3;
    }

    .result-subtitle {
      margin: 8px 0 0;
      color: var(--text-sub);
    }

    .shuffle-button {
      padding: 14px 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, #403126, #6b4b36);
      color: #fff8f1;
      font-size: 0.98rem;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(69, 46, 30, 0.2);
    }

    .shuffle-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
      box-shadow: none;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      overflow: hidden;
      min-height: 232px;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      background: var(--surface-strong);
      box-shadow: var(--shadow-card);
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.65s ease forwards;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: auto -24px -24px auto;
      width: 100px;
      height: 100px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 199, 147, 0.4), rgba(255, 255, 255, 0));
      transform: rotate(15deg);
    }

    .card:nth-child(2) {
      animation-delay: 0.08s;
    }

    .card:nth-child(3) {
      animation-delay: 0.16s;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 244, 230, 0.95);
      color: #996334;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .card h3 {
      margin: 18px 0 10px;
      font-size: 1.35rem;
      line-height: 1.4;
    }

    .description {
      margin: 0 0 20px;
      color: var(--text-sub);
      line-height: 1.7;
    }

    .meta {
      display: grid;
      gap: 10px;
      margin-top: auto;
    }

    .meta-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(251, 246, 240, 0.92);
      font-size: 0.95rem;
    }

    .meta-label {
      color: #7b6b5b;
      font-weight: 500;
    }

    .meta-value {
      font-weight: 700;
    }

    .empty-state {
      padding: 38px 24px;
      border: 1px dashed rgba(148, 124, 102, 0.24);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.64);
      text-align: center;
      color: var(--text-sub);
    }

    .empty-state strong {
      display: block;
      margin-bottom: 10px;
      color: var(--text-main);
      font-size: 1.15rem;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .genre-buttons,
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .result-header {
        flex-direction: column;
        align-items: stretch;
      }

      .shuffle-button {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1120px);
        padding-top: 20px;
        padding-bottom: 32px;
      }

      .hero,
      .panel {
        padding: 20px;
        border-radius: 22px;
      }

      .genre-buttons,
      .cards {
        grid-template-columns: 1fr;
      }

      .genre-button {
        padding: 15px 16px;
      }

      .card {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">今日の献立を軽やかに決める</div>
      <h1>気分に合わせて、おかずを3品まとめて提案</h1>
      <p>和食・洋食・中華・韓国料理からジャンルを選ぶだけで、すぐに今日のおかず候補を表示します。迷ったときは再抽選して、ちょうどいい組み合わせを見つけてください。</p>
    </section>

    <section class="panel" aria-labelledby="genre-heading">
      <h2 id="genre-heading" class="section-title">ジャンルを選択</h2>
      <p class="section-copy">気分に近いジャンルを選ぶと、そのカテゴリからランダムで3品を提案します。</p>
      <div class="genre-buttons" id="genreButtons" role="group" aria-label="ジャンル選択ボタン"></div>

      <div class="result-header">
        <div>
          <h2 class="result-title" id="resultTitle">まずはジャンルを選んでください</h2>
          <p class="result-subtitle" id="resultSubtitle">ボタンを押すと、おすすめのおかず3品を表示します。</p>
        </div>
        <button class="shuffle-button" id="shuffleButton" type="button" disabled>もう一回提案</button>
      </div>

      <section id="cardsArea" aria-live="polite">
        <div class="empty-state" id="emptyState">
          <strong>まだ提案は表示されていません</strong>
          ジャンルを選んで、今日の献立候補をチェックしてください。
        </div>
      </section>
    </section>
  </main>

  <script>
    const okazuData = {
      "和食": [
        { name: "肉じゃが", description: "甘辛い味付けでごはんが進む定番煮物です。", time: "約30分", difficulty: "★★☆" },
        { name: "ぶりの照り焼き", description: "香ばしい照りが食欲をそそる魚おかずです。", time: "約20分", difficulty: "★★☆" },
        { name: "ほうれん草の胡麻和え", description: "あと一品にちょうどいい、やさしい副菜です。", time: "約10分", difficulty: "★☆☆" },
        { name: "鶏のつくね焼き", description: "ふんわり食感と甘辛だれが相性抜群です。", time: "約25分", difficulty: "★★☆" },
        { name: "さばの味噌煮", description: "味噌のコクが染みた、ごはん向きの一皿です。", time: "約25分", difficulty: "★★★" },
        { name: "だし巻き卵", description: "だしの香りが広がる、ほっとする定番です。", time: "約15分", difficulty: "★★☆" },
        { name: "筑前煮", description: "根菜の旨みが楽しめる彩り豊かな煮物です。", time: "約35分", difficulty: "★★★" },
        { name: "豆腐ハンバーグ", description: "軽やかな食べ心地で満足感もある和風おかずです。", time: "約25分", difficulty: "★★☆" },
        { name: "れんこんきんぴら", description: "シャキッとした食感が楽しい常備菜向きの一品です。", time: "約12分", difficulty: "★☆☆" },
        { name: "鮭の南蛮漬け", description: "さっぱり食べられて作り置きにも向いています。", time: "約25分", difficulty: "★★☆" }
      ],
      "洋食": [
        { name: "チキンソテー レモンバター", description: "香ばしく焼いた鶏肉を爽やかな風味で楽しめます。", time: "約20分", difficulty: "★★☆" },
        { name: "ミートボールのトマト煮", description: "トマトの旨みで食べやすい、ごちそう感のある一品です。", time: "約30分", difficulty: "★★☆" },
        { name: "きのこグラタン", description: "とろりとしたソースがうれしい熱々メニューです。", time: "約25分", difficulty: "★★★" },
        { name: "ポテトサラダ", description: "クリーミーで食卓に合わせやすい万能副菜です。", time: "約18分", difficulty: "★☆☆" },
        { name: "白身魚のムニエル", description: "外は香ばしく中はふっくら仕上がる定番洋食です。", time: "約18分", difficulty: "★★☆" },
        { name: "ラタトゥイユ", description: "野菜をたっぷり味わえる彩り豊かな煮込みです。", time: "約30分", difficulty: "★★☆" },
        { name: "アスパラベーコンソテー", description: "手早く作れて食感も楽しい人気の組み合わせです。", time: "約10分", difficulty: "★☆☆" },
        { name: "ハニーマスタードチキン", description: "甘みと酸味のバランスが絶妙な主菜です。", time: "約20分", difficulty: "★★☆" },
        { name: "キャロットラペ", description: "さっぱりしていて箸休めにもぴったりです。", time: "約8分", difficulty: "★☆☆" },
        { name: "えびとブロッコリーのガーリック炒め", description: "香りよく仕上がる華やかな洋風おかずです。", time: "約15分", difficulty: "★★☆" }
      ],
      "中華": [
        { name: "麻婆豆腐", description: "ピリッとした辛さで食欲を刺激する定番中華です。", time: "約15分", difficulty: "★★☆" },
        { name: "青椒肉絲", description: "シャキシャキ野菜と細切り肉がよく合います。", time: "約20分", difficulty: "★★☆" },
        { name: "エビチリ", description: "甘辛ソースでえびを華やかに楽しめる一皿です。", time: "約20分", difficulty: "★★★" },
        { name: "回鍋肉", description: "濃いめの味付けでごはんが止まらない主菜です。", time: "約18分", difficulty: "★★☆" },
        { name: "春雨サラダ", description: "さっぱり食べられる中華風の副菜です。", time: "約12分", difficulty: "★☆☆" },
        { name: "油淋鶏", description: "香ばしい鶏肉にねぎだれがよく絡みます。", time: "約25分", difficulty: "★★★" },
        { name: "八宝菜", description: "具だくさんで栄養バランスも取りやすい一品です。", time: "約22分", difficulty: "★★☆" },
        { name: "棒棒鶏", description: "ごまだれのコクが楽しめる冷菜メニューです。", time: "約15分", difficulty: "★★☆" },
        { name: "にら玉", description: "手早く作れて彩りも良い定番炒めです。", time: "約10分", difficulty: "★☆☆" },
        { name: "肉団子の甘酢あん", description: "甘酸っぱさで食べやすい人気のおかずです。", time: "約25分", difficulty: "★★☆" }
      ],
      "韓国料理": [
        { name: "ヤンニョムチキン", description: "甘辛だれが絡む人気の韓国風チキンです。", time: "約25分", difficulty: "★★★" },
        { name: "チャプチェ", description: "春雨と野菜の旨みが広がる定番の炒め物です。", time: "約20分", difficulty: "★★☆" },
        { name: "チーズタッカルビ", description: "コクのある辛さで食卓が盛り上がる一皿です。", time: "約25分", difficulty: "★★★" },
        { name: "キムチチヂミ", description: "外はカリッと中はもっちり食感が楽しめます。", time: "約15分", difficulty: "★★☆" },
        { name: "ナムル盛り合わせ", description: "野菜を手軽に食べられる彩り副菜です。", time: "約12分", difficulty: "★☆☆" },
        { name: "プルコギ", description: "甘めの味付けで食べやすい牛肉おかずです。", time: "約20分", difficulty: "★★☆" },
        { name: "スンドゥブ風豆腐煮", description: "旨辛スープで体が温まる豆腐メニューです。", time: "約18分", difficulty: "★★☆" },
        { name: "トッポギ", description: "もちもち食感と甘辛ソースがくせになります。", time: "約15分", difficulty: "★★☆" },
        { name: "サムギョプサル風炒め", description: "豚肉と野菜を香ばしく楽しめる満足系おかずです。", time: "約18分", difficulty: "★★☆" },
        { name: "ケランマリ", description: "韓国風のやさしい卵焼きで副菜にもぴったりです。", time: "約10分", difficulty: "★☆☆" }
      ]
    };

    const genres = [
      { name: "和食", accent: "落ち着いた定番" },
      { name: "洋食", accent: "華やかな満足感" },
      { name: "中華", accent: "香りとコク" },
      { name: "韓国料理", accent: "旨辛の気分" }
    ];

    const genreButtons = document.getElementById("genreButtons");
    const cardsArea = document.getElementById("cardsArea");
    const resultTitle = document.getElementById("resultTitle");
    const resultSubtitle = document.getElementById("resultSubtitle");
    const shuffleButton = document.getElementById("shuffleButton");

    let currentGenre = "";

    function shuffleArray(list) {
      const copy = [...list];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
      }
      return copy;
    }

    function getRandomOkazu(genreName) {
      return shuffleArray(okazuData[genreName]).slice(0, 3);
    }

    function updateActiveButton() {
      const buttons = genreButtons.querySelectorAll(".genre-button");
      buttons.forEach((button) => {
        button.classList.toggle("active", button.dataset.genre === currentGenre);
        button.setAttribute("aria-pressed", String(button.dataset.genre === currentGenre));
      });
    }

    function renderCards(items) {
      const cardsMarkup = items.map((item, index) => `
        <article class="card" style="animation-delay: ${index * 0.08}s;">
          <div class="card-top">
            <span class="badge">おすすめ ${index + 1}</span>
          </div>
          <h3>${item.name}</h3>
          <p class="description">${item.description}</p>
          <div class="meta">
            <div class="meta-item">
              <span class="meta-label">調理時間</span>
              <span class="meta-value">${item.time}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">難易度</span>
              <span class="meta-value">${item.difficulty}</span>
            </div>
          </div>
        </article>
      `).join("");

      cardsArea.innerHTML = `<div class="cards">${cardsMarkup}</div>`;
    }

    function proposeOkazu(genreName) {
      currentGenre = genreName;
      updateActiveButton();
      renderCards(getRandomOkazu(genreName));
      resultTitle.textContent = `${genreName}のおすすめおかず`;
      resultSubtitle.textContent = `気分に合う3品を表示しています。気に入らなければ「もう一回提案」で再抽選できます。`;
      shuffleButton.disabled = false;
    }

    function createGenreButtons() {
      genreButtons.innerHTML = genres.map((genre) => `
        <button class="genre-button" type="button" data-genre="${genre.name}" aria-pressed="false">
          <span>${genre.accent}</span>
          <strong>${genre.name}</strong>
        </button>
      `).join("");

      genreButtons.querySelectorAll(".genre-button").forEach((button) => {
        button.addEventListener("click", () => {
          proposeOkazu(button.dataset.genre);
        });
      });
    }

    shuffleButton.addEventListener("click", () => {
      if (!currentGenre) {
        return;
      }
      proposeOkazu(currentGenre);
    });

    createGenreButtons();
  </script>
</body>
</html>
